{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm border-light" style="border-radius: var(--radius-md);">
                
                <!-- Card Header -->
                <div class="card-body p-4 text-center pb-2">
                    <div class="rounded-circle bg-primary-bg p-3 mx-auto mb-3 text-primary d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; font-size: 24px;">
                        <i class="bi bi-envelope-fill"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Contact Us</h3>
                    <p class="text-muted small px-3">
                        Have queries about account verification, registration errors, or system feedback? Send us a message and our support team will respond shortly.
                    </p>
                </div>

                <!-- Card Body Form -->
                <div class="card-body p-4 pt-0">
                    <form method="POST" action="/contact/">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-person"></i></span>
                                <input type="text" name="name" class="form-control border-start-0" placeholder="Enter your full name" required style="border-radius: 0 var(--radius-sm) var(--radius-sm) 0;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control border-start-0" placeholder="Enter your email" required style="border-radius: 0 var(--radius-sm) var(--radius-sm) 0;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message Details</label>
                            <textarea name="message" class="form-control" rows="4" placeholder="How can we help you?" required></textarea>
                        </div>

                        <button class="btn btn-primary w-100 py-2.5 mt-2 shadow-sm">
                            <i class="bi bi-send-fill me-1"></i> Send Support Message
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
