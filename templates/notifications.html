{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card shadow-sm border-light" style="border-radius: var(--radius-md);">
                
                <!-- Header -->
                <div class="card-header bg-white border-0 pt-4 px-4 pb-0 d-flex justify-content-between align-items-center">
                    <h4 class="fw-bold mb-0 text-dark"><i class="bi bi-bell-fill text-primary me-2"></i>Notifications Feed</h4>
                    <span class="badge bg-primary px-3 py-2">Updates</span>
                </div>

                <div class="card-body p-4">
                    {% for n in notifications %}
                        <div class="notification-item mb-3 d-flex align-items-center gap-3">
                            <div class="rounded-circle bg-primary-bg p-2 text-primary d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; flex-shrink: 0;">
                                <i class="bi bi-info-circle-fill"></i>
                            </div>
                            <div class="flex-grow-1">
                                <p class="mb-0 text-secondary" style="font-size: 14.5px;">{{ n.message }}</p>
                            </div>
                        </div>
                    {% empty %}
                        <div class="text-center py-5">
                            <div class="rounded-circle bg-light p-3 mx-auto mb-3 text-muted" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                                <i class="bi bi-bell-slash"></i>
                            </div>
                            <h5 class="fw-bold text-dark">No New Notifications</h5>
                            <p class="text-muted small">You will get alerted when alumni respond to your messages or approve mentorship access.</p>
                        </div>
                    {% endfor %}
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
