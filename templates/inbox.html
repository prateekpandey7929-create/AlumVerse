{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

<h2 class="mb-2 fw-bold">Inbox</h2>

<p class="text-muted mb-4">
Your conversations with alumni and students.
</p>

<div class="row g-3">

{% for c in conversations %}

<div class="col-md-6">

<a href="/messages/{{ c.user.id }}" class="conversation-card card shadow-sm">

<div class="card-body">

<div class="d-flex align-items-center">

<img src="{% static 'images/default-profile.png' %}"
class="chat-avatar">

<div class="ms-3">

<h6 class="mb-1">{{ c.user.username }}</h6>

<p class="text-muted mb-0 small">
{{ c.last_message }}
</p>

</div>

</div>

</div>

</a>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
