{% extends 'base.html' %}

{% block content %}

<div class="container py-4">

<h2 class="mb-4">Search Alumni</h2>

<form method="GET" class="mb-4">

<div class="row">

<div class="col-md-8">

<input type="text" name="q"
class="form-control"
placeholder="Search by skill">

</div>

<div class="col-md-4">

<button class="btn btn-primary w-100">
Search
</button>

</div>

</div>

</form>


<div class="row">

{% for alum in alumni %}

<div class="col-md-4">

<div class="alumni-card">

<h5>{{ alum.user.username }}</h5>

<p class="text-muted">{{ alum.skills }}</p>

<a href="/alumni-profile/{{ alum.user.id }}/"
class="btn btn-outline-primary">

View Profile

</a>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
