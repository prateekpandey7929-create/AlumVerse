{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="card shadow-lg border-0 p-4 p-md-5 animate__animated animate__fadeIn" style="border-radius: 16px; background: #ffffff;">
                
                <!-- Header -->
                <div class="mb-4 pb-3 border-bottom d-flex justify-content-between align-items-center">
                    <div>
                        <h3 class="fw-bold mb-1 text-dark d-flex align-items-center">
                            <span class="badge bg-primary-subtle text-primary me-2" style="border-radius: 8px; padding: 8px 12px;">
                                <i class="bi bi-pencil-square"></i>
                            </span>
                            Edit Post
                        </h3>
                        <p class="text-muted small mb-0">Update your community feed post message.</p>
                    </div>
                    <div>
                        <a href="/dashboard/" class="btn btn-sm btn-outline-secondary px-3 py-2 fw-semibold" style="border-radius: 8px; font-size: 13px;">
                            <i class="bi bi-arrow-left me-1"></i> Back
                        </a>
                    </div>
                </div>

                <!-- Form -->
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="post-content" class="form-label fw-bold text-secondary mb-2" style="font-size: 14px;">Post Content</label>
                        <textarea name="content" id="post-content" class="form-control border-1 p-3" rows="6" required style="border-radius: 8px; font-size: 15px; line-height: 1.6; resize: none;">{{ post.content }}</textarea>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                        <a href="/dashboard/" class="btn btn-outline-secondary px-4 py-2" style="border-radius: 8px;">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 py-2 fw-bold shadow-sm" style="border-radius: 8px;">
                            <i class="bi bi-check-circle-fill me-1"></i> Save Changes
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
