{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm border-light" style="border-radius: var(--radius-md);">
                
                <!-- Header -->
                <div class="card-header bg-white border-0 pt-4 px-4 pb-0 text-center">
                    <div class="rounded-circle bg-success-bg p-3 mx-auto mb-3 text-success d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; font-size: 24px;">
                        <i class="bi bi-briefcase-fill"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Post Career Opportunity</h3>
                    <p class="text-muted small px-3">Share available job positions, internship slots or training webinars with IIST students.</p>
                </div>

                <!-- Body -->
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="d-flex flex-column gap-3">
                            {{ form.as_p }}
                        </div>

                        <!-- Button -->
                        <button class="btn btn-success w-100 mt-4 py-2.5 shadow-sm">
                            <i class="bi bi-plus-circle-fill me-1"></i> Post Opportunity
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
