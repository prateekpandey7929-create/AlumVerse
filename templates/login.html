{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="login-page" style="background-image: url('{% static 'images/login-bg.jpg' %}');">

    <div class="login-overlay">

        <div class="container d-flex justify-content-center align-items-center">

            <div class="login-box">

                <div class="text-center mb-4">

                    <div class="login-icon">
                        🎓
                    </div>

                    <h2 class="mt-3">Welcome Back</h2>

                    <p class="text-muted">
                        Sign in to your AlumVerse account
                    </p>

                </div>

                <!-- ERROR MESSAGES -->

                {% if messages %}


                {% for message in messages %}

                <div class="alert alert-danger">
                    {{ message }}
                </div>

                {% endfor %}


                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Email Address
                        </label>

                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>

                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label mb-0">
                                Password
                            </label>
                            <a href="/forgot-password/" class="text-decoration-none small" style="font-size: 13px;">Forgot Password?</a>
                        </div>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password"
                            required>
                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Login As
                        </label>

                        <div class="d-flex gap-3">

                            <div class="form-check">

                                <input class="form-check-input" type="radio" name="role" value="admin">

                                <label class="form-check-label">
                                    Admin
                                </label>

                            </div>

                            <div class="form-check">

                                <input class="form-check-input" type="radio" name="role" value="alumni">

                                <label class="form-check-label">
                                    Alumni
                                </label>

                            </div>

                            <div class="form-check">

                                <input class="form-check-input" type="radio" name="role" value="student" checked>

                                <label class="form-check-label">
                                    Student
                                </label>

                            </div>

                        </div>

                    </div>

                    <button class="btn btn-primary w-100 mt-2">

                        Login

                    </button>

                </form>

                <p class="text-center mt-3">

                    Don't have an account?

                    <a href="/register/">
                        Register here
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
