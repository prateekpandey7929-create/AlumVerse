{% extends 'base.html' %}

<form method="POST">

{% csrf_token %}

<input type="text" name="query" class="form-control mb-2">

{% if response %}

<p class="mt-3"><b>Bot:</b> {{ response }}</p>
{% endif %}

{% endblock %}
