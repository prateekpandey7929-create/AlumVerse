{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 p-4" style="border-radius: 12px;">
                <div class="text-center mb-4">
                    <div class="icon-wrapper" style="font-size: 32px; background: rgba(0, 83, 204, 0.1); width: 70px; height: 70px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--primary);">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    <h3 class="fw-bold mt-3 text-dark">Verify Personal Email</h3>
                    <p class="text-muted small">
                        Enter the 6-digit verification code sent to your personal email:<br>
                        <span class="badge bg-light text-dark border p-2 mt-1">{{ email }}</span>
                    </p>
                </div>

                <!-- MESSAGES -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert {% if 'success' in message.tags %}alert-success{% else %}alert-danger{% endif %} shadow-sm">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label text-center d-block fw-semibold text-secondary">
                            Enter 6-Digit OTP
                        </label>
                        <input
                            type="text"
                            name="otp"
                            class="form-control text-center fs-3 py-2"
                            placeholder="------"
                            maxlength="6"
                            required
                            style="letter-spacing: 0.6rem; font-weight: bold; border-radius: 10px;"
                        >
                    </div>

                    <div class="d-flex gap-2">
                        <a href="/profile/add-personal-email/" class="btn btn-outline-secondary w-100 py-2.5 fw-bold" style="border-radius: 8px;">Back</a>
                        <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold shadow-sm" style="border-radius: 8px;">
                            Verify & Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
