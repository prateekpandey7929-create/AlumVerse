{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 p-4 p-md-5" style="border-radius: 16px; background: #ffffff;">
                <div class="text-center mb-4">
                    <div class="d-inline-flex p-3 bg-success-subtle text-success rounded-circle mb-3">
                        <i class="bi bi-shield-lock-fill fs-2"></i>
                    </div>
                    <h3 class="fw-bold mb-1 text-dark">Reset Password</h3>
                    <p class="text-muted small">Enter the 6-digit verification code sent to <b>{{ email }}</b> and choose your new password.</p>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert {% if 'success' in message.tags %}alert-success{% else %}alert-danger{% endif %} alert-dismissible fade show border-0 mb-3 shadow-sm" role="alert" style="border-radius: 8px;">
                            <div style="white-space: pre-line;">{{ message }}</div>
                            <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- OTP Input -->
                    <div class="mb-3">
                        <label for="otp" class="form-label fw-semibold text-secondary">Verification Code (OTP)</label>
                        <input type="text" name="otp" id="otp" class="form-control py-2.5 text-center font-monospace" placeholder="123456" maxlength="6" required style="border-radius: 8px; font-size: 18px; letter-spacing: 4px;">
                    </div>

                    <!-- Password Input -->
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold text-secondary">New Password</label>
                        <input type="password" name="password" id="password" class="form-control py-2.5" placeholder="Create new password" required style="border-radius: 8px;">
                    </div>

                    <!-- Confirm Password Input -->
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-semibold text-secondary">Confirm New Password</label>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control py-2.5" placeholder="Confirm new password" required style="border-radius: 8px;">
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2.5 fw-semibold shadow-sm mb-3" style="border-radius: 8px;">
                        Reset Password
                    </button>
                    
                    <div class="text-center">
                        <a href="/forgot-password/" class="text-decoration-none small fw-semibold"><i class="bi bi-arrow-left me-1"></i> Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
